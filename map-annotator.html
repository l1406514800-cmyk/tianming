<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地图标注工具</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      overflow: hidden;
    }
    #container {
      display: flex;
      height: 100vh;
    }
    #left-panel {
      width: 300px;
      background: #1a1a1a;
      border-right: 1px solid #333;
      padding: 20px;
      overflow-y: auto;
    }
    #canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #0a0a0a;
    }
    #map-canvas {
      cursor: crosshair;
      display: block;
    }
    h1 {
      color: #ffd700;
      font-size: 18px;
      margin-bottom: 20px;
    }
    .section {
      margin-bottom: 20px;
      padding: 15px;
      background: #2a2a2a;
      border-radius: 6px;
    }
    .section h3 {
      color: #ffd700;
      font-size: 14px;
      margin-bottom: 10px;
    }
    input, button {
      width: 100%;
      padding: 8px;
      margin-bottom: 8px;
      background: #333;
      border: 1px solid #555;
      color: #e0e0e0;
      border-radius: 4px;
      font-size: 12px;
    }
    button {
      background: #ffd700;
      color: #1a1a1a;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #ffed4e;
    }
    button:disabled {
      background: #666;
      cursor: not-allowed;
    }
    .btn-danger {
      background: #e05c5c;
      color: #fff;
    }
    .btn-danger:hover {
      background: #ff6b6b;
    }
    #region-list {
      max-height: 300px;
      overflow-y: auto;
      font-size: 11px;
    }
    .region-item {
      padding: 8px;
      margin-bottom: 4px;
      background: #333;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .region-item:hover {
      background: #444;
    }
    .region-item.active {
      background: #ffd700;
      color: #1a1a1a;
    }
    .point-count {
      font-size: 10px;
      color: #888;
    }
    .status {
      padding: 10px;
      background: #2a2a2a;
      border-radius: 4px;
      font-size: 11px;
      margin-bottom: 10px;
    }
    .info {
      color: #0f0;
    }
    .warning {
      color: #ff0;
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="left-panel">
      <h1>🗺️ 地图标注工具</h1>

      <div class="section">
        <h3>智能生成</h3>
        <button onclick="autoRecognize()">🤖 智能识别地块</button>
        <div style="font-size: 10px; color: #888; margin-top: 4px;">
          点击后选择图片文件进行识别
        </div>
      </div>

      <div class="section">
        <h3>当前地块</h3>
        <input type="text" id="region-name" placeholder="地块名称（如：辽东）">
        <div class="status">
          <div class="info">点击地图标注边界点</div>
          <div>已标注: <span id="point-count">0</span> 个点</div>
        </div>
        <button onclick="finishRegion()">✓ 完成当前地块</button>
        <button onclick="clearCurrentRegion()" class="btn-danger">✗ 清除当前地块</button>
      </div>

      <div class="section">
        <h3>已标注地块 (<span id="region-count">0</span>)</h3>
        <div id="region-list"></div>
        <div style="margin-top: 10px;">
          <button onclick="deleteSelectedRegion()" class="btn-danger" id="btn-delete" disabled>删除选中地块</button>
          <button onclick="renameSelectedRegion()" id="btn-rename" disabled>重命名</button>
        </div>
      </div>

      <div class="section">
        <h3>操作</h3>
        <button onclick="undoLastPoint()">↶ 撤销上一个点</button>
        <button onclick="exportTemplate()">💾 导出模板</button>
        <button onclick="importTemplate()">📂 导入模板</button>
        <button onclick="clearAll()" class="btn-danger">🗑️ 清空所有</button>
      </div>

      <div class="section">
        <h3>视图控制</h3>
        <button onclick="zoomIn()">🔍 放大</button>
        <button onclick="zoomOut()">🔍 缩小</button>
        <button onclick="resetView()">🔄 重置视图</button>
      </div>
    </div>

    <div id="canvas-container">
      <canvas id="map-canvas"></canvas>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('map-canvas');
    const ctx = canvas.getContext('2d');

    let mapImage = null;
    let regions = [];
    let currentRegion = { name: '', points: [] };
    let view = { offsetX: 0, offsetY: 0, scale: 1, isDragging: false, dragStartX: 0, dragStartY: 0 };
    let selectedRegionIndex = -1;

    // 加载地图图片
    const img = new Image();
    // img.crossOrigin = 'anonymous'; // 本地服务器不需要跨域
    img.src = 'maps/asia-map.png';
    img.onload = function() {
      console.log('[SUCCESS] 图片加载成功:', img.width, 'x', img.height);
      mapImage = img;
      canvas.width = window.innerWidth - 300;
      canvas.height = window.innerHeight;

      // 居中显示
      const scale = Math.min(canvas.width / img.width, canvas.height / img.height) * 0.9;
      view.scale = scale;
      view.offsetX = (canvas.width - img.width * scale) / 2;
      view.offsetY = (canvas.height - img.height * scale) / 2;

      console.log('[INFO] Canvas尺寸:', canvas.width, 'x', canvas.height);
      console.log('[INFO] 缩放比例:', scale);
      console.log('[INFO] 偏移:', view.offsetX, view.offsetY);

      render();
    };
    img.onerror = function() {
      console.error('[ERROR] 图片加载失败！');
      alert('图片加载失败！请检查路径: maps/asia-map.png');
    };

    // 渲染
    function render() {
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (!mapImage) return;

      ctx.save();
      ctx.translate(view.offsetX, view.offsetY);
      ctx.scale(view.scale, view.scale);

      // 绘制地图
      ctx.drawImage(mapImage, 0, 0);

      // 绘制已完成的地块
      regions.forEach((region, index) => {
        if (region.points.length < 3) return;

        ctx.beginPath();
        ctx.moveTo(region.points[0].x, region.points[0].y);
        for (let i = 1; i < region.points.length; i++) {
          ctx.lineTo(region.points[i].x, region.points[i].y);
        }
        ctx.closePath();

        // 不同地块使用不同颜色
        const hue = (index * 137.5) % 360; // 黄金角度分布
        const isSelected = index === selectedRegionIndex;

        if (isSelected) {
          // 选中的地块：黄色高亮
          ctx.strokeStyle = '#ff0';
          ctx.lineWidth = 3 / view.scale;
          ctx.fillStyle = 'rgba(255, 255, 0, 0.3)';
        } else {
          // 普通地块：彩色边界
          ctx.strokeStyle = `hsl(${hue}, 70%, 50%)`;
          ctx.lineWidth = 1.5 / view.scale;
          ctx.fillStyle = `hsla(${hue}, 70%, 50%, 0.15)`;
        }

        ctx.stroke();
        ctx.fill();

        // 绘制地块名称
        if (region.points.length > 0) {
          const centerX = region.points.reduce((sum, p) => sum + p.x, 0) / region.points.length;
          const centerY = region.points.reduce((sum, p) => sum + p.y, 0) / region.points.length;
          ctx.fillStyle = isSelected ? '#ff0' : '#fff';
          ctx.strokeStyle = '#000';
          ctx.lineWidth = 3 / view.scale;
          ctx.font = (12 / view.scale) + 'px Arial';
          ctx.textAlign = 'center';
          ctx.strokeText(region.name, centerX, centerY);
          ctx.fillText(region.name, centerX, centerY);
        }
      });

      // 绘制当前正在标注的地块
      if (currentRegion.points.length > 0) {
        ctx.beginPath();
        ctx.moveTo(currentRegion.points[0].x, currentRegion.points[0].y);
        for (let i = 1; i < currentRegion.points.length; i++) {
          ctx.lineTo(currentRegion.points[i].x, currentRegion.points[i].y);
        }
        ctx.strokeStyle = '#ff0';
        ctx.lineWidth = 2 / view.scale;
        ctx.stroke();

        // 绘制点
        currentRegion.points.forEach((p, i) => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, 4 / view.scale, 0, Math.PI * 2);
          ctx.fillStyle = i === 0 ? '#f00' : '#ff0';
          ctx.fill();
        });
      }

      ctx.restore();
    }

    // 鼠标事件
    canvas.addEventListener('click', function(e) {
      if (!mapImage) return;

      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX - rect.left - view.offsetX) / view.scale;
      const y = (e.clientY - rect.top - view.offsetY) / view.scale;

      currentRegion.points.push({ x, y });
      document.getElementById('point-count').textContent = currentRegion.points.length;
      render();
    });

    canvas.addEventListener('mousedown', function(e) {
      if (e.button === 1 || e.button === 2) {
        view.isDragging = true;
        view.dragStartX = e.clientX - view.offsetX;
        view.dragStartY = e.clientY - view.offsetY;
        e.preventDefault();
      }
    });

    canvas.addEventListener('mousemove', function(e) {
      if (view.isDragging) {
        view.offsetX = e.clientX - view.dragStartX;
        view.offsetY = e.clientY - view.dragStartY;
        render();
      }
    });

    canvas.addEventListener('mouseup', function() {
      view.isDragging = false;
    });

    canvas.addEventListener('contextmenu', function(e) {
      e.preventDefault();
    });

    canvas.addEventListener('wheel', function(e) {
      e.preventDefault();
      const delta = e.deltaY > 0 ? 0.9 : 1.1;
      const rect = canvas.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;

      view.offsetX = mouseX - (mouseX - view.offsetX) * delta;
      view.offsetY = mouseY - (mouseY - view.offsetY) * delta;
      view.scale *= delta;

      render();
    });

    // 完成当前地块
    function finishRegion() {
      const name = document.getElementById('region-name').value.trim();
      if (!name) {
        alert('请输入地块名称！');
        return;
      }
      if (currentRegion.points.length < 3) {
        alert('至少需要3个点！');
        return;
      }

      regions.push({
        name: name,
        points: currentRegion.points.slice()
      });

      currentRegion = { name: '', points: [] };
      document.getElementById('region-name').value = '';
      document.getElementById('point-count').textContent = '0';

      updateRegionList();
      render();
    }

    // 清除当前地块
    function clearCurrentRegion() {
      currentRegion = { name: '', points: [] };
      document.getElementById('point-count').textContent = '0';
      render();
    }

    // 撤销上一个点
    function undoLastPoint() {
      if (currentRegion.points.length > 0) {
        currentRegion.points.pop();
        document.getElementById('point-count').textContent = currentRegion.points.length;
        render();
      }
    }

    // 更新地块列表
    function updateRegionList() {
      const list = document.getElementById('region-list');
      list.innerHTML = regions.map((r, i) =>
        `<div class="region-item ${i === selectedRegionIndex ? 'active' : ''}" onclick="selectRegion(${i})">
          <span>${r.name}</span>
          <span class="point-count">${r.points.length}点</span>
        </div>`
      ).join('');
      document.getElementById('region-count').textContent = regions.length;
    }

    // 选择地块
    function selectRegion(index) {
      selectedRegionIndex = index;
      updateRegionList();
      render();

      // 启用编辑按钮
      document.getElementById('btn-delete').disabled = false;
      document.getElementById('btn-rename').disabled = false;
    }

    // 删除选中地块
    function deleteSelectedRegion() {
      if (selectedRegionIndex < 0) return;
      if (!confirm('确定删除 "' + regions[selectedRegionIndex].name + '" 吗？')) return;

      regions.splice(selectedRegionIndex, 1);
      selectedRegionIndex = -1;
      updateRegionList();
      render();

      document.getElementById('btn-delete').disabled = true;
      document.getElementById('btn-rename').disabled = true;
    }

    // 重命名选中地块
    function renameSelectedRegion() {
      if (selectedRegionIndex < 0) return;

      const oldName = regions[selectedRegionIndex].name;
      const newName = prompt('输入新名称:', oldName);

      if (newName && newName.trim()) {
        regions[selectedRegionIndex].name = newName.trim();
        updateRegionList();
        render();
      }
    }

    // 导出模板
    function exportTemplate() {
      if (regions.length === 0) {
        alert('没有地块可导出！');
        return;
      }

      const template = {
        id: 'asia-historical',
        name: '亚洲历史地图',
        width: mapImage.width,
        height: mapImage.height,
        regions: regions.map((r, i) => ({
          id: i + 1,
          name: r.name,
          coords: r.points.flatMap(p => [Math.round(p.x), Math.round(p.y)]),
          center: [
            Math.round(r.points.reduce((sum, p) => sum + p.x, 0) / r.points.length),
            Math.round(r.points.reduce((sum, p) => sum + p.y, 0) / r.points.length)
          ],
          owner: '',
          terrain: 'plains',
          resources: [],
          development: 50,
          troops: 0,
          characters: [],
          neighbors: []
        }))
      };

      const json = JSON.stringify(template, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'asia-map-template.json';
      a.click();
      URL.revokeObjectURL(url);

      alert('模板已导出！\n地块数: ' + regions.length);
    }

    // 导入模板
    function importTemplate() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function() {
          try {
            const template = JSON.parse(reader.result);
            regions = template.regions.map(r => ({
              name: r.name,
              points: []
            }));

            // 转换坐标
            template.regions.forEach((r, i) => {
              for (let j = 0; j < r.coords.length; j += 2) {
                regions[i].points.push({
                  x: r.coords[j],
                  y: r.coords[j + 1]
                });
              }
            });

            updateRegionList();
            render();
            alert('模板已导入！\n地块数: ' + regions.length);
          } catch (err) {
            alert('导入失败: ' + err.message);
          }
        };
        reader.readAsText(file);
      };
      input.click();
    }

    // 清空所有
    function clearAll() {
      if (!confirm('确定要清空所有地块吗？')) return;
      regions = [];
      currentRegion = { name: '', points: [] };
      selectedRegionIndex = -1;
      updateRegionList();
      render();
    }

    // 视图控制
    function zoomIn() {
      view.scale *= 1.2;
      render();
    }

    function zoomOut() {
      view.scale *= 0.8;
      render();
    }

    function resetView() {
      if (!mapImage) return;
      const scale = Math.min(canvas.width / mapImage.width, canvas.height / mapImage.height) * 0.9;
      view.scale = scale;
      view.offsetX = (canvas.width - mapImage.width * scale) / 2;
      view.offsetY = (canvas.height - mapImage.height * scale) / 2;
      render();
    }

    // 窗口大小改变
    window.addEventListener('resize', function() {
      canvas.width = window.innerWidth - 300;
      canvas.height = window.innerHeight;
      render();
    });
  </script>
  <script src="map-recognition-eu4.js"></script>
  <script>
    // 智能识别
    async function autoRecognize() {
      if (regions.length > 0) {
        if (!confirm('已有标注数据，智能识别会覆盖。是否继续？')) {
          return;
        }
      }

      // 让用户选择图片文件
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';

      input.onchange = async function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const btn = document.querySelector('button[onclick="autoRecognize()"]');
        btn.disabled = true;
        btn.textContent = '正在加载图片...';

        try {
          // 检查识别函数
          if (typeof recognizeMapEU4Style !== 'function') {
            throw new Error('识别函数未加载，请确保 map-recognition-eu4.js 已加载');
          }

          // 使用 FileReader 读取图片
          const reader = new FileReader();
          const dataUrl = await new Promise((resolve, reject) => {
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(file);
          });

          // 创建图片对象
          const recognitionImg = new Image();
          await new Promise((resolve, reject) => {
            recognitionImg.onload = resolve;
            recognitionImg.onerror = () => reject(new Error('图片加载失败'));
            recognitionImg.src = dataUrl;
          });

          console.log('[INFO] 图片加载成功，开始识别...');
          btn.textContent = '正在识别...';

          const options = {
            minArea: 1000,  // 增加最小面积，减少小地块
            maxSize: 1000   // 降低最大尺寸，加快识别
          };

          const progressCallback = (percent, text) => {
            btn.textContent = '识别中 ' + Math.round(percent) + '%';
          };

          const recognizedRegions = await recognizeMapEU4Style(recognitionImg, options, progressCallback);

          // 转换为标注格式
          regions = recognizedRegions.map((r, i) => {
            const points = [];
            // 从边界提取点
            if (r.boundary && r.boundary.length > 0) {
              r.boundary.forEach(([x, y]) => {
                points.push({ x, y });
              });
            }
            return {
              name: '地块' + (i + 1),
              points: points
            };
          });

          updateRegionList();
          render();
          btn.textContent = '✓ 识别完成';
          alert('识别完成！共识别出 ' + regions.length + ' 个地块\n\n现在可以：\n1. 点击地块选中\n2. 修改地块名称\n3. 调整边界点\n4. 删除不需要的地块');

          setTimeout(() => {
            btn.textContent = '🤖 智能识别地块';
            btn.disabled = false;
          }, 2000);

        } catch (error) {
          console.error('[ERROR]', error);
          alert('识别失败: ' + error.message);
          btn.textContent = '🤖 智能识别地块';
          btn.disabled = false;
        }
      };

      input.click();
    }
  </script>
</body>
</html>
